<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画着玩</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="fullScreenCanvas"></canvas>

    <script>
        const canvas = document.getElementById('fullScreenCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawStroke(x, y, path) {
            ctx.beginPath();
            ctx.moveTo(x + path[0][0], y + path[0][1]);
            for (let i = 1; i < path.length; i++) {
                if (path[i].length === 2) {
                    ctx.lineTo(x + path[i][0], y + path[i][1]);
                } else {
                    ctx.bezierCurveTo(
                        x + path[i][0], y + path[i][1],
                        x + path[i][2], y + path[i][3],
                        x + path[i][4], y + path[i][5]
                    );
                }
            }
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'black';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) / 800;

            drawStroke(centerX - 180 * scale, centerY - 60 * scale, [
                [0, 0], [0, 100 * scale],
                [10 * scale, 50 * scale, 40 * scale, 50 * scale, 70 * scale, 50 * scale],
                [70 * scale, 50 * scale, 70 * scale, 90 * scale, 70 * scale, 100 * scale]
            ]);
            drawStroke(centerX - 180 * scale, centerY - 60 * scale, [
                [0, 0], [70 * scale, 0]
            ]);
            drawStroke(centerX - 145 * scale, centerY - 10 * scale, [
                [0, 0], [0, 50 * scale]
            ]);

            drawStroke(centerX - 90 * scale, centerY - 60 * scale, [
                [0, 0], [80 * scale, 0], [80 * scale, 100 * scale], [0, 100 * scale], [0, 0]
            ]);
            drawStroke(centerX - 70 * scale, centerY - 40 * scale, [
                [0, 0], [40 * scale, 0], [40 * scale, 60 * scale], [0, 60 * scale], [0, 0]
            ]);
            drawStroke(centerX - 50 * scale, centerY - 20 * scale, [
                [0, 0], [0, 40 * scale]
            ]);

            drawStroke(centerX + 10 * scale, centerY - 60 * scale, [
                [0, 0], [80 * scale, 0]
            ]);
            drawStroke(centerX + 10 * scale, centerY - 60 * scale, [
                [0, 0], [0, 100 * scale]
            ]);
            drawStroke(centerX + 10 * scale, centerY - 10 * scale, [
                [0, 0], [80 * scale, 0]
            ]);
            drawStroke(centerX + 90 * scale, centerY - 60 * scale, [
                [0, 0], [0, 100 * scale]
            ]);

            drawStroke(centerX + 110 * scale, centerY - 60 * scale, [
                [0, 0], [0, 100 * scale]
            ]);
            drawStroke(centerX + 110 * scale, centerY - 60 * scale, [
                [0, 0], [80 * scale, 0]
            ]);
            drawStroke(centerX + 110 * scale, centerY - 10 * scale, [
                [0, 0], [80 * scale, 0]
            ]);
            drawStroke(centerX + 150 * scale, centerY - 40 * scale, [
                [0, 0], [0, 80 * scale]
            ]);

            // 柿
            drawStroke(centerX + 210 * scale, centerY - 60 * scale, [
                [0, 0], [80 * scale, 0], [80 * scale, 100 * scale], [0, 100 * scale], [0, 0]
            ]);
            drawStroke(centerX + 230 * scale, centerY - 40 * scale, [
                [0, 0], [40 * scale, 0], [40 * scale, 60 * scale], [0, 60 * scale], [0, 0]
            ]);
            drawStroke(centerX + 250 * scale, centerY - 20 * scale, [
                [0, 0], [0, 40 * scale]
            ]);
        }

        draw();
    </script>
</body>
</html>
