<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滚动切换图片的分栏网页</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: calc(100vh - 40px); /* 减去上下margin */
            margin: 20px;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
        }

        .left-half,
        .right-half {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .image-container,
        .section-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 400%;
            /* 4个部分的总高度 */
            transition: transform 0.5s ease-out;
        }

        .image-slide,
        .section {
            width: 100%;
            height: 25%;
            /* 每个部分占总高度的1/4 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            text-align: center;
            box-sizing: border-box;
        }

        .image-slide {
            background-size: cover;
            background-position: center;
        }

        .section {
            padding: 20px;
        }

        .progress-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 18px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left-half">
            <div class="image-container">
                <div class="image-slide" style="background-color: #FF6B6B;"></div>
                <div class="image-slide" style="background-color: #4ECDC4;"></div>
                <div class="image-slide" style="background-color: #45B7D1;"></div>
                <div class="image-slide" style="background-color: #F7DB4F;"></div>
            </div>
        </div>
        <div class="right-half">
            <div class="section-container">
                <div class="section">
                    <p>这里是不吃西红柿的实验工坊</p>
                </div>
                <div class="section">
                    <p>在这里，没有框架，没有打包器，没有其他第三方库</p>
                </div>
                <div class="section">
                    <p>一切都是古法手写，尽情享受原生JS的乐趣🕶️</p>
                </div>
                <div class="section">
                    <p>End</p>
                </div>
            </div>
        </div>
    </div>

    <div class="progress-indicator">1 / 4</div>

    <script>
        // 脚本部分保持不变
        const imageContainer = document.querySelector('.image-container');
        const sectionContainer = document.querySelector('.section-container');
        const sections = document.querySelectorAll('.section');
        const totalSections = sections.length;
        const progressIndicator = document.querySelector('.progress-indicator');

        let currentSection = 0;
        let isScrolling = false;

        function updateSection(direction) {
            if (isScrolling) return;
            isScrolling = true;

            currentSection += direction;
            currentSection = Math.max(0, Math.min(currentSection, totalSections - 1));

            const translateY = currentSection * (100 / totalSections);
            imageContainer.style.transform = `translateY(-${translateY}%)`;
            sectionContainer.style.transform = `translateY(-${translateY}%)`;
            progressIndicator.textContent = `${currentSection + 1} / ${totalSections}`;

            setTimeout(() => {
                isScrolling = false;
            }, 500);
        }

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const direction = e.deltaY > 0 ? 1 : -1;
            updateSection(direction);
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                updateSection(1);
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                updateSection(-1);
            }
        });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchEndY = e.touches[0].clientY;
            const direction = touchStartY > touchEndY ? 1 : -1;
            if (Math.abs(touchStartY - touchEndY) > 50) {
                updateSection(direction);
                touchStartY = touchEndY;
            }
        }, { passive: false });
    </script>
</body>

</html>
